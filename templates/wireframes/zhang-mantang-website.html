    .nav-tools { display: flex; justify-self: end; gap: var(--s); align-items: center; }
    .search-box { min-width: 200px; padding: 9px 14px; border: var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 16px; color: var(--mid); cursor: pointer; }

    .kicker { font-size: 14px; color: var(--mid); margin-bottom: 6px; letter-spacing: .06em; }

    .h2 { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 300; line-height: 1.3; }
    .section-link { font-size: 16px; color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 3px; }

    .art-frame { aspect-ratio: 4/5; background: linear-gradient(135deg, #E8E2DA 0%, #CEC6BC 50%, #9E9288 100%); position: relative; overflow: hidden; border-bottom: var(--border-soft); display: grid; place-items: center; }

    .meta { font-size: 13px; color: var(--mid); margin-top: 6px; }

    .hero-copy { max-width: 640px; color: #fff; }

    .hero-copy .body { color: rgba(255,255,255,.75); font-size: 16px; max-width: 520px; }

    .news-time { font-size: 13px; color: var(--mid); margin-top: auto; padding-top: var(--s); }

    .detail-specs { border-top: var(--border-soft); padding-top: 22px; display: grid; gap: 12px; }
    .spec-row { display: grid; grid-template-columns: 90px 1fr; gap: 16px; font-size: 15px; }
    .spec-label { color: var(--mid); }
    .detail-copy { display: grid; gap: 18px; max-width: 900px; font-size: 16px; line-height: 1.8; }
    .detail-subnav { display: flex; justify-content: space-between; align-items: flex-start; gap: var(--m); margin-bottom: 28px; }
    .detail-shell { display: grid; grid-template-columns: 140px 1fr; gap: var(--m); align-items: start; }
    .detail-main { min-width: 0; }
    .divider { margin: 48px 0; border: none; border-top: var(--border-soft); }

    /* NEWS DETAIL */
    .news-detail-layout { display: grid; grid-template-columns: minmax(0, 1fr) minmax(320px, .75fr); gap: var(--m); margin-top: var(--m); align-items: start; }
    .news-detail-text { display: grid; gap: 20px; font-size: 16px; line-height: 1.9; max-width: 680px; }

    /* FOOTER */

    .btn-accept { padding: 9px 22px; background: var(--accent); color: #fff; font-size: 14px; border: none; cursor: pointer; }
    .btn-decline { padding: 9px 22px; border: 1px solid rgba(255,255,255,.3); color: rgba(255,255,255,.7); font-size: 14px; cursor: pointer; }
    .btn-primary { padding: 12px 32px; background: var(--ink); color: #fff; font-size: 16px; border: none; cursor: pointer; transition: background .2s; font-family: inherit; font-weight: 300; }
    .btn-primary:hover { background: #333; }

    /* RESPONSIVE */
    @media (max-width: 1100px) {
      :root { --l: 40px; }
      .nav { grid-template-columns: 1fr; height: auto; padding: 20px var(--l); }
      .brand, .menu, .nav-tools { justify-self: start; }

      .hero-bg-text { font-size: 120px; }

      .about-grid { grid-template-columns: 1fr; }
      .contact-strip { grid-template-columns: 1fr; }
      .exhibit-block { grid-template-columns: 1fr; }
      .exhibit-image { border-right: none; border-bottom: var(--border-soft); }
      .detail-meta-grid { grid-template-columns: 1fr; }

    }
    @media (max-width: 700px) {
      :root { --l: 20px; --xl: 72px; }
      .grid-3 { grid-template-columns: 1fr; }
      .span-2 { grid-column: auto; }

      .news-detail-layout { grid-template-columns: 1fr; }
      .footer { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>

        </div>
      </div>
      <Footer t={t} />
    </>
  );
}

// ── NEWS DETAIL ───────────────────────────────────────────────────────────────
function NewsDetail({ lang, t, id, setPage }) {
  const d = t.detail;
  const item = NEWS.find(n => n.id === id) || NEWS[0];
  const years = [...new Set(NEWS.map(n => n.date.split('.')[0]))].sort((a,b) => b-a);
  return (
    <>
      <div className="detail-wrap">
        <a className="back-link" onClick={() => setPage('news')}>{d.backNews}</a>
        <div className="detail-shell">
          <aside className="year-rail">
            {years.map(y => (
              <button key={y} className={`year-node ${item.date.startsWith(y)?'active':''}`}>{y}</button>
            ))}
          </aside>
          <div className="detail-main">
            <div className="tag">{lang==='zh' ? item.tagZh : item.tagEn}</div>
            <h2 className="h2" style={{maxWidth:'820px', marginTop:'10px'}}>{lang==='zh' ? item.titleZh : item.titleEn}</h2>
            <div className="meta" style={{marginTop:'16px'}}>{item.date}</div>
            <div className="news-detail-layout">
              <div className="news-detail-text">
                <p>{lang==='zh' ? item.bodyZh : item.bodyEn}</p>
              </div>
              <div className="detail-hero news-h">
                <span className="detail-hero-label">{lang==='zh'?'新闻配图':'News Image'}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <Footer t={t} />
    </>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState('zh');
  const [page, setPage] = useState('home');
  const [detailId, setDetailId] = useState(null);
  const [detailType, setDetailType] = useState(null);
  const [cookieDismissed, setCookieDismissed] = useState(false);

  const t = T[lang];

  const scrollToTop = useCallback((p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const renderPage = () => {
    switch(page) {
      case 'home': return <HomePage lang={lang} t={t} setPage={scrollToTop} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'works': return <WorksPage lang={lang} t={t} setPage={scrollToTop} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'exhibitions': return <ExhibitionsPage lang={lang} t={t} setPage={scrollToTop} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'news': return <NewsPage lang={lang} t={t} setPage={scrollToTop} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'about': return <AboutPage lang={lang} t={t} />;
      case 'artwork-detail': return <ArtworkDetail lang={lang} t={t} id={detailId} setPage={scrollToTop} />;
      case 'exhibition-detail': return <ExhibitionDetail lang={lang} t={t} id={detailId} setPage={scrollToTop} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'news-detail': return <NewsDetail lang={lang} t={t} id={detailId} setPage={scrollToTop} />;
      default: return <HomePage lang={lang} t={t} setPage={scrollToTop} setDetailId={setDetailId} setDetailType={setDetailType} />;
    }
  };

  const detailPages = ['artwork-detail','exhibition-detail','news-detail'];

  return (
    <div className="site">
      <Nav lang={lang} setLang={setLang} page={detailPages.includes(page)?detailType||'home':page} setPage={scrollToTop} t={t} />
      {renderPage()}

      {!cookieDismissed && (
        <div className="cookie-banner">
          <p className="cookie-text">{t.cookie.text}</p>
          <div className="cookie-actions">
            <button className="btn-accept" onClick={() => setCookieDismissed(true)}>{t.cookie.accept}</button>
            <button className="btn-decline" onClick={() => setCookieDismissed(true)}>{t.cookie.decline}</button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
