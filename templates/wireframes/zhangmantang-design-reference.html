<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>张满堂官网 · 设计参考稿 · 桌面端全集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── TOKENS ─────────────────────────────────────────────────────── */
    :root {
      --bg:          #F2EFED;
      --card:        #FFFFFF;
      --accent:      #C8A060;
      --ink:         #1A1A1A;
      --mid:         #6A6868;
      --soft:        #A8A4A0;
      --border-soft: #D6D2CE;
      --hero-fallback: #D4CEC6;
      --contact-bg:  #F5F2EE;

      --border: 1px solid #1A1A1A;
      --line:   1px solid #D6D2CE;
      --shadow: 0 10px 24px rgba(26,26,26,.10);
      --shadow-float: 0 10px 24px rgba(26,26,26,.14);

      --s:  16px;
      --m:  40px;
      --l:  90px;
      --xl: 120px;
      --maxw: 1440px;
      --nav-h: 88px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.6;
    }

    a { text-decoration: none; color: inherit; cursor: pointer; }
    button { font: inherit; font-weight: 300; background: none; border: none; cursor: pointer; color: inherit; }
    img { display: block; width: 100%; }

    /* ── SITE SHELL ─────────────────────────────────────────────────── */
    .site {
      max-width: var(--maxw);
      margin: 0 auto;
      background: var(--card);
      min-height: 100vh;
      border-left: var(--line);
      border-right: var(--line);
    }

    /* ── TYPOGRAPHY ─────────────────────────────────────────────────── */
    .h1 { font-family: 'Noto Serif SC', serif; font-size: 48px; font-weight: 300; line-height: 1.15; }
    .h2 { font-family: 'Noto Serif SC', serif; font-size: 24px; font-weight: 300; line-height: 1.3; }
    .kicker { font-size: 16px; color: var(--mid); margin-bottom: 6px; }
    .meta   { font-size: 16px; color: var(--mid); margin-top: 6px; }
    .tag    { font-size: 16px; color: var(--accent); margin-bottom: 8px; }

    /* ── NAV ────────────────────────────────────────────────────────── */
    .nav {
      height: var(--nav-h);
      padding: 0 var(--l);
      border-bottom: var(--line);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: var(--m);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 12px; justify-self: start; }
    .seal {
      width: 32px; height: 32px; flex-shrink: 0;
      border: var(--border);
      display: grid; place-items: center;
      font-family: 'Noto Serif SC', serif; font-size: 13px;
      color: var(--accent);
    }
    .brand-names { display: flex; gap: 16px; align-items: center; }
    .brand-cn { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 300; }
    .brand-en { font-size: 16px; color: var(--mid); letter-spacing: .04em; white-space: nowrap; }
    .menu { display: flex; gap: var(--m); justify-self: center; }
    .nav-link { font-size: 16px; color: var(--mid); padding-bottom: 4px; border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; }
    .nav-link:hover, .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-tools { display: flex; justify-self: end; gap: var(--s); align-items: center; }

    /* search box */
    .search-shell { position: relative; }
    .search-box {
      min-width: 260px; height: 42px;
      padding: 0 12px;
      border: var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: var(--card);
      font-size: 16px; color: var(--ink);
      cursor: text;
    }
    .search-input {
      flex: 1; height: 100%; border: none; outline: none; background: transparent;
      font: inherit; font-weight: 300; font-size: 16px; color: var(--ink);
    }
    .search-input::placeholder { color: var(--soft); }
    .search-icon { color: var(--mid); font-size: 18px; }
    .search-suggestions {
      position: absolute; top: calc(100% + 8px); left: 0;
      width: 100%; min-width: 260px;
      border: var(--line); background: var(--card);
      box-shadow: var(--shadow); z-index: 12;
      display: grid; gap: 10px; padding: 14px 16px;
    }
    .search-suggestion { font-size: 16px; color: var(--mid); text-align: left; transition: color .2s; }
    .search-suggestion:hover { color: var(--accent); }

    /* lang switch */
    .lang-switch { display: flex; border: var(--line); }
    .lang-btn { padding: 10px 14px; font-size: 16px; color: var(--mid); border-left: var(--line); transition: color .2s; }
    .lang-btn:first-child { border-left: none; }
    .lang-btn.active { color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }

    /* ── HERO ───────────────────────────────────────────────────────── */
    .hero {
      height: calc(100vh - var(--nav-h));
      min-height: 700px;
      position: relative; overflow: hidden;
      border-bottom: var(--line);
      background-color: var(--hero-fallback);
      background: linear-gradient(160deg, #5A4E44 0%, #2E261E 55%, #1A1510 100%);
    }
    .hero-art {
      position: absolute; inset: 0;
      background-color: var(--hero-fallback);
      background: linear-gradient(135deg,#4A3E36 0%,#2A211A 50%,#1A1510 100%);
      display: grid; place-items: center;
    }
    .hero-watermark {
      font-family: 'Noto Serif SC', serif; font-size: 260px; font-weight: 300;
      color: rgba(200,160,96,.06); user-select: none; letter-spacing: -.02em;
    }
    .hero-overlay {
      position: absolute; left: var(--l); right: var(--l); bottom: var(--xl);
      display: flex; justify-content: space-between; align-items: flex-end; gap: var(--m);
    }
    .hero-copy { max-width: 700px; color: #fff; }
    .hero-copy .h1 { color: #fff; white-space: pre-line; }
    .hero-copy .body { color: rgba(255,255,255,.92); font-size: 16px; margin-top: var(--s); max-width: 520px; }
    .hero-trust { display: flex; flex-wrap: wrap; gap: 18px; margin-top: 28px; }
    .trust-item { font-size: 12px; color: rgba(255,255,255,.76); letter-spacing: .08em; text-transform: uppercase; border-left: 1px solid rgba(255,255,255,.35); padding-left: 12px; }
    .scroll-mark {
      width: 40px; height: 40px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,.72); color: #fff;
      display: grid; place-items: center; font-size: 22px; flex-shrink: 0;
    }

    /* ── SECTION LAYOUT ─────────────────────────────────────────────── */
    .section { padding: var(--xl) var(--l); border-bottom: var(--line); }
    .section-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: var(--m); margin-bottom: var(--m);
    }
    .section-link { font-size: 16px; color: var(--accent); border-bottom: 1px solid var(--accent); padding-bottom: 4px; }

    /* ── GRIDS ──────────────────────────────────────────────────────── */
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--m); }
    .span-2 { grid-column: span 2; }

    /* ── WORK CARD ──────────────────────────────────────────────────── */
    .work-card { border: var(--line); background: var(--card); transition: transform .2s, box-shadow .2s, border-color .2s; cursor: pointer; }
    .work-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
    .art-frame {
      aspect-ratio: 5/4; border-bottom: var(--line);
      background: #FAF8F5; display: flex; align-items: center; justify-content: center;
      padding: 18px; overflow: hidden;
    }
    .art-frame-label { font-size: 13px; color: rgba(26,26,26,.45); text-align: center; }
    .card-body { padding: 24px; }

    /* ── FILTERS ────────────────────────────────────────────────────── */
    .filter-row { display: flex; justify-content: space-between; align-items: flex-end; gap: var(--m); margin-bottom: var(--m); }
    .filters { display: flex; gap: var(--s); flex-wrap: wrap; }
    .filter-btn { padding: 10px 18px; border: var(--line); color: var(--mid); font-size: 16px; background: var(--card); transition: color .2s, border-color .2s; }
    .filter-btn.active, .filter-btn:hover { color: var(--accent); border-color: var(--accent); box-shadow: var(--shadow); text-decoration: underline; text-underline-offset: 6px; text-decoration-color: var(--accent); }

    /* dropdown */
    .preview-anchor { position: relative; display: inline-flex; align-items: center; }
    .preview-panel {
      position: absolute; top: calc(100% - 1px); left: 0;
      min-width: 340px; background: var(--card);
      border: var(--border); border-top: none;
      box-shadow: var(--shadow); padding: 20px 24px; z-index: 8;
    }
    .preview-list { display: grid; gap: 12px; justify-items: start; }
    .preview-link { font-size: 16px; color: var(--mid); transition: color .2s; }
    .preview-link:hover { color: var(--accent); text-decoration: underline; text-decoration-color: var(--accent); text-underline-offset: 4px; }
    .preview-anchor.open .filter-btn { color: var(--accent); border-color: var(--accent); border-bottom-color: var(--card); background: var(--card); z-index: 9; }

    /* ── YEAR LAYOUT (exhibitions + news + detail shells) ───────────── */
    .year-layout { display: grid; grid-template-columns: 140px 1fr; gap: var(--m); align-items: start; }
    .year-rail {
      position: sticky; top: calc(var(--nav-h) + 32px);
      display: flex; flex-direction: column; gap: 24px;
      padding-top: 8px; position: relative;
    }
    .year-rail::before {
      content: ''; position: absolute;
      left: 5px; top: 0; bottom: 0; width: 1px;
      background: var(--mid); opacity: .35;
    }
    .year-node {
      position: relative; display: flex; align-items: center; gap: 16px;
      font-size: 16px; color: var(--mid); text-align: left;
      transition: color .2s; padding: 0;
    }
    .year-node::before {
      content: ''; width: 12px; height: 12px; border-radius: 999px;
      border: 1px solid var(--soft); background: var(--card);
      flex-shrink: 0; z-index: 1; transition: background .2s, border-color .2s;
    }
    .year-node.active { color: var(--accent); }
    .year-node.active::before { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 4px rgba(200,160,96,.16); }
    .year-node:hover { color: var(--accent); }

    /* ── EXHIBITION CARD ────────────────────────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: var(--m); }
    .exhibition-block {
      border: var(--line); background: var(--card);
      display: grid; grid-template-columns: 1fr .85fr;
      transition: transform .2s, box-shadow .2s, border-color .2s; cursor: pointer;
    }
    .exhibition-block:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
    .exhibition-image {
      min-height: 320px; border-right: var(--line);
      background: #F7F3EE; display: flex; align-items: center; justify-content: center; padding: 18px;
    }
    .exhibition-image-label { font-size: 13px; color: rgba(26,26,26,.45); text-align: center; }
    .exhibition-info { padding: 32px; display: flex; flex-direction: column; justify-content: center; gap: var(--s); }

    /* ── NEWS CARD ──────────────────────────────────────────────────── */
    .news-card { border: var(--line); background: var(--card); transition: transform .2s, box-shadow .2s, border-color .2s; cursor: pointer; }
    .news-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--accent); }
    .news-card .news-image {
      min-height: 220px; border-bottom: var(--line);
      background: #F7F3EE; display: flex; align-items: center; justify-content: center; padding: 18px;
    }
    .news-card .news-image-label { font-size: 13px; color: rgba(26,26,26,.45); }
    .news-card .card-body { display: flex; flex-direction: column; min-height: 160px; }
    .news-time { font-size: 16px; color: var(--mid); margin-top: auto; padding-top: var(--s); }

    /* ── ABOUT ──────────────────────────────────────────────────────── */
    .about-wrap { display: grid; grid-template-columns: 400px 1fr; gap: 56px; align-items: start; }
    .portrait-stack { display: grid; gap: 0; align-content: start; justify-items: start; }
    .portrait-primary {
      width: min(100%, 332px);
      background: linear-gradient(135deg, #E2DDD6 0%, #C8C0B4 50%, #9A9080 100%);
      aspect-ratio: 3/4; display: grid; place-items: center;
    }
    .portrait-secondary {
      width: min(56%, 188px); aspect-ratio: 2/3;
      background: linear-gradient(135deg, #DDD8D0, #C0B8AC);
      display: grid; place-items: center;
      margin-top: -18px; margin-left: 146px;
    }
    .portrait-label { font-size: 12px; color: rgba(26,26,26,.45); }
    .bio-block { display: flex; flex-direction: column; gap: 32px; }
    .timeline-list { display: grid; gap: 0; padding-top: 24px; border-top: var(--line); }
    .timeline-item {
      display: grid; grid-template-columns: 96px 1fr; gap: 20px;
      padding: 18px 0 20px; border-bottom: var(--line); width: 100%;
    }
    .tl-year { font-family: 'Noto Serif SC', serif; font-size: 20px; font-weight: 300; color: var(--accent); line-height: 1.2; }

    /* ── CONTACT STRIP ──────────────────────────────────────────────── */
    .contact-section { background: var(--contact-bg); }
    .contact { display: grid; grid-template-columns: minmax(320px,1fr) minmax(420px,.95fr); gap: var(--m); align-items: start; }
    .contact-meta { display: grid; gap: 14px; align-content: start; }
    .contact-row { display: grid; grid-template-columns: 84px 1fr; gap: 24px; align-items: baseline; }
    .contact-label { font-size: 16px; color: var(--mid); }

    /* ── DETAIL PAGES ───────────────────────────────────────────────── */
    .detail-page { padding: var(--xl) var(--l); border-bottom: var(--line); }
    .back-link { display: inline-block; font-size: 16px; color: var(--mid); margin-bottom: var(--m); border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; }
    .back-link:hover { color: var(--accent); border-bottom-color: var(--accent); }

    /* detail shell: year rail + main */
    .detail-content-shell { display: grid; grid-template-columns: 140px 1fr; gap: var(--m); align-items: start; }
    .detail-content-main { min-width: 0; }

    /* media component */
    .detail-media { position: relative; }
    .detail-media-frame {
      display: grid; grid-template-columns: 36px minmax(0,1fr) 36px;
      gap: 14px; align-items: center;
    }
    .detail-media-frame.single { grid-template-columns: minmax(0,1fr); }
    .detail-hero {
      width: 100%; min-height: 420px; border: var(--line);
      background: #FAF8F5; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .detail-hero img { width: 100%; height: 100%; max-height: 70vh; object-fit: contain; }
    .detail-hero-label { font-size: 16px; color: rgba(26,26,26,.45); }
    .detail-media-nav {
      width: 36px; height: 36px;
      border-radius: 999px; background: rgba(255,255,255,.94); border: var(--line);
      display: grid; place-items: center;
      box-shadow: var(--shadow-float); transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .detail-media-nav:hover:not(:disabled) { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 14px 28px rgba(26,26,26,.18); }
    .detail-media-nav:disabled { opacity: .38; cursor: default; }
    .nav-arrow { width: 10px; height: 10px; display: block; border-top: 1.5px solid currentColor; border-right: 1.5px solid currentColor; }
    .nav-arrow.prev { transform: rotate(-135deg); margin-left: 3px; }
    .nav-arrow.next { transform: rotate(45deg); margin-right: 3px; }
    .detail-thumbs { display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
    .detail-thumb {
      width: auto; min-width: 72px; max-width: 160px; height: 92px;
      border: var(--line); padding: 6px; background: var(--card);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .detail-thumb.active { border-color: var(--accent); box-shadow: var(--shadow); }
    .detail-thumb-label { font-size: 11px; color: rgba(26,26,26,.45); }

    /* detail info grid */
    .detail-meta-grid { display: grid; grid-template-columns: minmax(0,1.2fr) minmax(280px,.8fr); gap: var(--m); margin-top: var(--m); align-items: start; }
    .detail-copy { color: var(--mid); display: grid; gap: 16px; font-size: 16px; line-height: 1.8; }
    .detail-specs { border-top: var(--line); padding-top: 24px; display: grid; gap: 12px; }
    .detail-spec-row { display: grid; grid-template-columns: 96px 1fr; gap: 16px; font-size: 16px; }
    .detail-spec-label { color: var(--mid); }

    /* exhibition detail specs (compact, right-aligned) */
    .exhibition-detail-specs { width: min(420px,100%); margin-top: 24px; margin-left: auto; }
    .exhibition-detail-specs .detail-spec-row { grid-template-columns: 84px 1fr; gap: 12px; }

    /* news detail layout */
    .news-detail-layout { display: grid; grid-template-columns: minmax(0,1fr) minmax(280px,.75fr); gap: var(--m); margin-top: var(--m); align-items: start; }
    .news-detail-text { display: grid; gap: 20px; font-size: 16px; line-height: 1.9; }
    .detail-link-list { display: grid; gap: 10px; margin-top: 24px; }
    .detail-link-row { font-size: 16px; color: var(--ink); }
    .detail-link-label { color: var(--mid); margin-right: 8px; }
    .detail-link-anchor { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }

    .detail-divider { margin: 48px 0; border: none; border-top: var(--line); }

    /* ── SEARCH RESULTS ─────────────────────────────────────────────── */
    .search-results { display: grid; gap: 20px; }
    .search-result { border: var(--line); background: var(--card); transition: transform .2s, box-shadow .2s, border-color .2s; cursor: pointer; }
    .search-result:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--accent); }
    .search-result-inner { padding: 24px 28px; display: grid; gap: 8px; }
    .search-result-type { font-size: 12px; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; }
    .search-query-bar {
      display: flex; align-items: center; gap: 12px;
      border: var(--border); padding: 0 16px; height: 48px;
      background: var(--card); margin-bottom: var(--m);
    }
    .search-query-input { flex: 1; font: inherit; font-size: 16px; border: none; outline: none; background: transparent; }
    .search-count { font-size: 16px; color: var(--mid); margin-bottom: var(--m); }

    /* ── FOOTER ─────────────────────────────────────────────────────── */
    .footer { padding: var(--m) var(--l); display: flex; justify-content: space-between; align-items: center; border-top: var(--line); color: var(--mid); font-size: 16px; }

    /* ── PAGE SWITCHER (design reference nav) ───────────────────────── */
    .ref-nav {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(26,26,26,.92); backdrop-filter: blur(8px);
      border-radius: 40px; padding: 10px 20px;
      display: flex; gap: 4px; z-index: 9999;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    .ref-nav-btn {
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; color: rgba(255,255,255,.65);
      transition: background .15s, color .15s; white-space: nowrap;
    }
    .ref-nav-btn:hover { color: #fff; background: rgba(255,255,255,.1); }
    .ref-nav-btn.active { background: var(--accent); color: #fff; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────── */
    @media (max-width: 1100px) {
      :root { --l: 40px; }
      .nav { grid-template-columns: 1fr; height: auto; padding: 20px var(--l); }
      .brand,.menu,.nav-tools { justify-self: start; }
      .hero { height: auto; min-height: 640px; }
      .hero-overlay { position: static; padding: var(--xl) var(--l); display: grid; }
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .year-layout,.about-wrap,.contact,.detail-meta-grid,.detail-content-shell,.news-detail-layout { grid-template-columns: 1fr; }
      .year-rail { position: static; flex-direction: row; flex-wrap: wrap; gap: 12px 20px; padding-top: 0; }
      .year-rail::before { display: none; }
      .exhibition-block { grid-template-columns: 1fr; }
      .exhibition-image { border-right: none; border-bottom: var(--line); }
    }
    @media (max-width: 760px) {
      :root { --l: 24px; --xl: 72px; --font-h1: 38px; }
      .h1 { font-size: 38px; }
      .grid-3 { grid-template-columns: 1fr; }
      .span-2 { grid-column: auto; }
      .ref-nav { bottom: 12px; padding: 8px 12px; gap: 2px; }
      .ref-nav-btn { font-size: 11px; padding: 5px 10px; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

/* ─── CONTENT DATA ───────────────────────────────────────────────────────── */

function ImgPlaceholder({ label, style = {}, className = '' }) {
  return (
    <div className={className} style={{ display:'grid', placeItems:'center', ...style }}>
      <span style={{ fontSize:13, color:'rgba(26,26,26,.4)', textAlign:'center', padding:'0 8px' }}>{label}</span>
    </div>
  );
}

function Nav({ lang, setLang, page, setPage, t }) {
  const [searchVal, setSearchVal] = useState('');
  const [suggestOpen, setSuggestOpen] = useState(false);
  const suggestions = [
    { zh:'人民大会堂永久收藏', en:'Great Hall of the People Collection' },
    { zh:'卢浮宫国际展览', en:'Louvre Exhibition' },
    { zh:'天宫二号太空项目', en:'Tiangong-2 Space Project' },
  ];
  const handleSearch = (e) => {
    e.preventDefault();
    if (searchVal.trim()) { setPage('search'); setSuggestOpen(false); }
  };

  return (
    <header className="nav">
      <div className="brand" style={{cursor:'pointer'}} onClick={() => setPage('home')}>
        <div className="seal">印</div>
        <div className="brand-names">
          <span className="brand-cn">张满堂</span>
          <span className="brand-en">ZHANG MANTANG</span>
        </div>
      </div>

      <nav className="menu">
        {['home','works','exhibitions','news','about'].map(p => (
          <a key={p} className={`nav-link ${page===p?'active':''}`} onClick={() => setPage(p)}>
            {{ home:lang==='zh'?'首页':'Home', works:lang==='zh'?'作品':'Works', exhibitions:lang==='zh'?'展览':'Exhibitions', news:lang==='zh'?'新闻':'News', about:lang==='zh'?'关于':'About' }[p]}
          </a>
        ))}
      </nav>

      <div className="nav-tools">
        <div className="search-shell">
          <form className="search-box" onSubmit={handleSearch}>
            <input
              className="search-input"
              placeholder={lang==='zh'?'搜索作品、展览、新闻…':'Search works, exhibitions, news…'}
              value={searchVal}
              onChange={e => { setSearchVal(e.target.value); setSuggestOpen(e.target.value.length === 0); }}
              onFocus={() => setSuggestOpen(true)}
              onBlur={() => setTimeout(() => setSuggestOpen(false), 150)}
            />
            <span className="search-icon">⌕</span>
          </form>
          {suggestOpen && (
            <div className="search-suggestions">
              {suggestions.map((s,i) => (
                <button key={i} className="search-suggestion" onClick={() => { setSearchVal(lang==='zh'?s.zh:s.en); setPage('search'); setSuggestOpen(false); }}>
                  {lang==='zh' ? s.zh : s.en}
                </button>
              ))}
            </div>
          )}
        </div>
        <div className="lang-switch">
          <button className={`lang-btn ${lang==='zh'?'active':''}`} onClick={() => setLang('zh')}>中</button>
          <button className={`lang-btn ${lang==='en'?'active':''}`} onClick={() => setLang('en')}>EN</button>
        </div>
      </div>
    </header>
  );
}

/* ─── APP SHELL ──────────────────────────────────────────────────────────── */
const PAGES = [
  { key:'home',               labelZh:'首页',         labelEn:'Home' },
  { key:'works',              labelZh:'作品列表',      labelEn:'Works' },
  { key:'artwork-detail',     labelZh:'作品详情',      labelEn:'Work Detail' },
  { key:'exhibitions',        labelZh:'展览列表',      labelEn:'Exhibitions' },
  { key:'exhibition-detail',  labelZh:'展览详情',      labelEn:'Exh. Detail' },
  { key:'news',               labelZh:'新闻列表',      labelEn:'News' },
  { key:'news-detail',        labelZh:'新闻详情',      labelEn:'News Detail' },
  { key:'about',              labelZh:'关于页',        labelEn:'About' },
  { key:'search',             labelZh:'搜索结果',      labelEn:'Search' },
  { key:'contact-reference',  labelZh:'联系参考',      labelEn:'Contact Ref' },
];

function App() {
  const [lang, setLang] = useState('zh');
  const [page, setPage] = useState('home');
  const [detailId, setDetailId] = useState(1);
  const [detailType, setDetailType] = useState(null);
  const [searchQuery, setSearchQuery] = useState('军民情');

  const navigate = useCallback((p) => {
    setPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, []);

  const navPageKey = ['artwork-detail','exhibition-detail','news-detail'].includes(page)
    ? (detailType || 'home') : page;

  const renderPage = () => {
    switch(page) {
      case 'home':               return <HomePage lang={lang} setPage={navigate} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'works':              return <WorksPage lang={lang} setPage={navigate} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'artwork-detail':     return <ArtworkDetailPage lang={lang} id={detailId} setPage={navigate} />;
      case 'exhibitions':        return <ExhibitionsPage lang={lang} setPage={navigate} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'exhibition-detail':  return <ExhibitionDetailPage lang={lang} id={detailId} setPage={navigate} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'news':               return <NewsPage lang={lang} setPage={navigate} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'news-detail':        return <NewsDetailPage lang={lang} id={detailId} setPage={navigate} />;
      case 'about':              return <AboutPage lang={lang} />;
      case 'search':             return <SearchPage lang={lang} query={searchQuery} setPage={navigate} setDetailId={setDetailId} setDetailType={setDetailType} />;
      case 'contact-reference':  return <ContactReferencePage lang={lang} />;
      default:                   return <HomePage lang={lang} setPage={navigate} setDetailId={setDetailId} setDetailType={setDetailType} />;
    }
  };

  return (
    <>
      <div className="site">
        <Nav lang={lang} setLang={setLang} page={navPageKey} setPage={navigate} />
        {renderPage()}
      </div>

      {/* floating page switcher */}
      <nav className="ref-nav">
        {PAGES.map(p => (
          <button key={p.key} className={`ref-nav-btn ${page===p.key?'active':''}`}
            onClick={() => {
              if (p.key.includes('detail')) {
                if (p.key==='artwork-detail')    { setDetailId(1); setDetailType('artwork'); }
                if (p.key==='exhibition-detail') { setDetailId(1); setDetailType('exhibition'); }
                if (p.key==='news-detail')       { setDetailId(1); setDetailType('news'); }
              }
              navigate(p.key);
            }}>
            {lang==='zh' ? p.labelZh : p.labelEn}
          </button>
        ))}
      </nav>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
